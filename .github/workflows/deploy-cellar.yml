name: Deploy to Clever Cloud Cellar

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - name: Sync bundles to Cellar (long cache, immutable)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CELLAR_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CELLAR_SECRET }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws s3 sync dist/ s3://${{ secrets.CELLAR_BUCKET }}/ \
            --endpoint-url https://cellar-c2.services.clever-cloud.com \
            --delete \
            --acl public-read \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"

      - name: Sync HTML to Cellar (short cache)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CELLAR_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CELLAR_SECRET }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws s3 sync dist/ s3://${{ secrets.CELLAR_BUCKET }}/ \
            --endpoint-url https://cellar-c2.services.clever-cloud.com \
            --acl public-read \
            --cache-control "public, max-age=300" \
            --content-type "text/html; charset=utf-8" \
            --exclude "*" \
            --include "*.html"

      - name: Publish prod manifest at bucket root
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CELLAR_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CELLAR_SECRET }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws s3 cp manifests/manifest.prod.xml \
            s3://${{ secrets.CELLAR_BUCKET }}/manifest.xml \
            --endpoint-url https://cellar-c2.services.clever-cloud.com \
            --acl public-read \
            --content-type "application/xml; charset=utf-8" \
            --cache-control "public, max-age=300"

      - name: Summary
        run: |
          echo "Deploye sur https://${{ secrets.CELLAR_BUCKET }}.cellar-c2.services.clever-cloud.com/"
